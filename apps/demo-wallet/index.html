<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="WalletKit" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TON Wallet Demo</title>
    <style>
      /* Themed background painted before any JS/CSS loads, so the cross-app
         handoff (dApp -> wallet) never flashes white. */
      html,
      body {
        margin: 0;
        background: #ffffff;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 300ms ease;
      }
      #boot-splash .spinner {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 3px solid rgba(128, 128, 128, 0.2);
        border-top-color: #0098ea;
        animation: boot-spin 0.7s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-splash"><div class="spinner"></div></div>

    <script type="module" src="/src/extension/bufferPolyfill.ts"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
