packages:
  - packages/*
  - apps/*
  - demo/*
  - packages/create-appkit/template-*

allowBuilds:
  esbuild: false
  node-hid: false
  spawn-sync: false
  unrs-resolver: false
  usb: false

catalog:
  '@tanstack/query-core': ^5.100.14
  '@tanstack/react-query': ^5.100.14
  '@ton/core': ^0.63.1
  '@ton/crypto': ^3.3.0
  '@tonconnect/bridge-sdk': ^0.2.8
  '@tonconnect/protocol': ^2.5.0-alpha.0
  '@tonconnect/sdk': ^3.5.0-alpha.0
  '@tonconnect/ui': ^2.5.0-alpha.0
  '@tonconnect/ui-react': ^2.5.0-alpha.0
  '@types/react': 19.2.3
  '@types/react-dom': 19.2.3
  buffer: ^6.0.3
  eslint: 9.39.4
  lru-cache: ^11.5.0
  react: 19.2.3
  react-dom: 19.2.3
  react-native: 0.81.5
  rimraf: 6.1.3
  typescript: 5.9.3
  vite: 8.0.14

minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.60.0'
  - '@typescript-eslint/parser@8.60.0'
  - '@typescript-eslint/project-service@8.60.0'
  - '@typescript-eslint/scope-manager@8.60.0'
  - '@typescript-eslint/tsconfig-utils@8.60.0'
  - '@typescript-eslint/type-utils@8.60.0'
  - '@typescript-eslint/types@8.60.0'
  - '@typescript-eslint/typescript-estree@8.60.0'
  - '@typescript-eslint/utils@8.60.0'
  - '@typescript-eslint/visitor-keys@8.60.0'
  - '@ton/appkit-react@1.0.0-alpha.3'
  - '@ton/appkit@1.0.0-alpha.3'
  - '@ton/walletkit@1.0.0-alpha.3'

onlyBuiltDependencies:
  - node-hid
