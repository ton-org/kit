name: Just log mcp wallet address

on:
  push:
  # Allows manual workflow runs with branch selection in UI
  workflow_dispatch: {}


jobs:
  log-wallet-address:
    name: log-wallet-address
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

    - name: Check out code
      uses: actions/checkout@v5

    - name: Read .nvmrc
      run: echo "NVMRC=$(cat .nvmrc)" >> $GITHUB_ENV

    - uses: pnpm/action-setup@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '${{ env.NVMRC }}'
        cache: 'pnpm'

    - name: Set up dependencies
      run: pnpm i --frozen-lockfile

    - name: Build workspace dependencies
      run: pnpm turbo build --filter=@ton/mcp^...

    - name: Log wallet address
      run: pnpm --filter @ton/mcp test:integration --reporter=verbose -t "get_wallet returns the mnemonic-derived testnet wallet"
      env:
        TON_MCP_INTEGRATION_MNEMONIC: ${{ secrets.WALLET_MNEMONIC }}
        TONCENTER_API_KEY: ${{ secrets.TONCENTER_API_KEY }}
