name: Release create-appkit

on:
  workflow_dispatch:
    branches:
      - release

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Release

    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build everything
        run: |
          pnpm build

      - name: Check if version exists on npm
        id: check_versions
        run: |
          get_npm_tag() {
            local version=$1
            if [[ "$version" == *"-alpha"* ]]; then
              echo "alpha"
            elif [[ "$version" == *"-beta"* ]]; then
              echo "beta"
            elif [[ "$version" == *"-rc"* ]]; then
              echo "rc"
            else
              echo "latest"
            fi
          }

          LOCAL_VERSION=$(node -p "require('./packages/create-appkit/package.json').version")
          NPM_TAG=$(get_npm_tag "$LOCAL_VERSION")
          echo "create-appkit local version: $LOCAL_VERSION (tag: $NPM_TAG)"

          echo "create_appkit_version=${LOCAL_VERSION}" >> $GITHUB_OUTPUT
          echo "create_appkit_tag=${NPM_TAG}" >> $GITHUB_OUTPUT

          if npm view "create-appkit@${LOCAL_VERSION}" version 2>/dev/null; then
            echo "create-appkit@${LOCAL_VERSION} already exists on npm"
            echo "create_appkit_exists=true" >> $GITHUB_OUTPUT
          else
            echo "create-appkit@${LOCAL_VERSION} does not exist on npm"
            echo "create_appkit_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish create-appkit
        if: steps.check_versions.outputs.create_appkit_exists == 'false'
        run: |
          pnpm publish \
            --filter="create-appkit" \
            --access=public \
            --publish-branch=release \
            --tag=${{ steps.check_versions.outputs.create_appkit_tag }} \
            --verbose
